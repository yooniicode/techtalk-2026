services:
  opencode:
    build: ./opencode
    environment:
      - AWS_BEARER_TOKEN_BEDROCK=${AWS_BEARER_TOKEN_BEDROCK}
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_PW}
      - GH_TOKEN=${GITHUB_TOKEN}          # gh CLI 인증 (이슈 읽기/생성)
      - GITHUB_TOKEN=${GITHUB_TOKEN}      # git push 인증에도 사용
      - GIT_AUTHOR_NAME=${GIT_NAME}
      - GIT_AUTHOR_EMAIL=${GIT_EMAIL}
      - GIT_COMMITTER_NAME=${GIT_NAME}
      - GIT_COMMITTER_EMAIL=${GIT_EMAIL}
    volumes:
      - opencode-workspace:/workspace   # 에이전트가 레포를 clone하는 작업공간
      - "D:/obsidian:/vault"            # 옵시디언 볼트 (읽기+쓰기, git 레포라 되돌릴 수 있음)
      - ./opencode/opencode.json:/root/.config/opencode/opencode.json:ro   # 기본 모델 = Claude
      - opencode-data:/root/.local/share/opencode
    # 포트를 호스트에 노출하지 않음 — 봇만 내부 네트워크로 접근
    restart: unless-stopped

  bot:
    build: ./bot
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - OPENCODE_URL=http://opencode:4096
      - OPENCODE_PW=${OPENCODE_PW}
      - GITHUB_TOKEN=${GITHUB_TOKEN}    # 레포 목록 autocomplete용
    depends_on:
      - opencode
    restart: unless-stopped

volumes:
  opencode-data:
  opencode-workspace:
